services:
  - type: web
    name: roomzy
    runtime: node
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: GEMINI_API_KEY
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

      - key: APP_URL
        sync: false
